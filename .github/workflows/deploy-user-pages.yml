name: Deploy User Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-user-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static export
        run: pnpm build

      - name: Ensure GitHub Pages static mode
        run: touch out/.nojekyll

      - name: Deploy to Ishwar8264.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          external_repository: Ishwar8264/Ishwar8264.github.io
          publish_branch: main
          publish_dir: ./out
          force_orphan: false
          commit_message: "deploy: sync from Ishwar-portfolios"
